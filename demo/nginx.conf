server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    location = / {
        default_type text/html;
        return 200 '<!doctype html><html><head><title>eBPF demo app</title></head><body><h1>eBPF demo app</h1><p>Healthy response generated by nginx.</p></body></html>';
    }

    location = /error {
        default_type text/plain;
        return 500 'synthetic demo error\n';
    }

    location = /health {
        default_type text/plain;
        return 200 'ok\n';
    }
}
