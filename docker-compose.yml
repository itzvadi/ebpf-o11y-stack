name: ebpf-observability

networks:
  ebpf:
    driver: bridge

volumes:
  pyroscope-data:
  mimir-data:
  grafana-data:

services:

  # ── eBPF pipeline ─────────────────────────────────────────────────────────
  alloy:
    image: grafana/alloy:v1.8.2
    container_name: alloy
    restart: unless-stopped
    networks:
      - ebpf
    ports:
      - "127.0.0.1:12345:12345"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /proc:/proc:ro
      - /sys:/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run /etc/alloy/config.alloy --server.http.listen-addr=0.0.0.0:12345
    privileged: true
    pid: host
    cap_add:
      - BPF
      - SYS_PTRACE
      - NET_RAW
      - PERFMON
      - DAC_READ_SEARCH
      - CHECKPOINT_RESTORE
    security_opt:
      - apparmor:unconfined
    depends_on:
      - pyroscope
      - mimir

  # ── Storage ───────────────────────────────────────────────────────────────
  pyroscope:
    image: grafana/pyroscope:1.12.0
    container_name: pyroscope
    restart: unless-stopped
    networks:
      - ebpf
    ports:
      - "127.0.0.1:4040:4040"
    volumes:
      - pyroscope-data:/data

  mimir:
    image: grafana/mimir:2.15.0
    container_name: mimir
    restart: unless-stopped
    networks:
      - ebpf
    ports:
      - "127.0.0.1:9009:9009"
    volumes:
      - ./mimir/mimir-config.yml:/etc/mimir/mimir-config.yml:ro
      - mimir-data:/data
    command: -config.file=/etc/mimir/mimir-config.yml

  # ── Dashboards ────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    restart: unless-stopped
    networks:
      - ebpf
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - pyroscope
      - mimir

  # ── Demo workload ─────────────────────────────────────────────────────────
  demo-app:
    image: nginx:alpine
    container_name: demo-app
    restart: unless-stopped
    networks:
      - ebpf
    ports:
      - "127.0.0.1:8080:80"

  traffic-gen:
    image: alpine:3.19
    container_name: traffic-gen
    restart: unless-stopped
    init: true
    networks:
      - ebpf
    depends_on:
      - demo-app
    command: >
      sh -c "while true; do wget -q -O- http://demo-app:80 > /dev/null 2>&1; sleep 2; done"
