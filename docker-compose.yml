name: observability

networks:
  observability:
    driver: bridge

volumes:
  loki-data:
  mimir-data:
  grafana-data:
  alloy-data:
  pyroscope-data:

services:

  loki:
    image: grafana/loki:3.4.1
    container_name: loki
    restart: unless-stopped
    networks:
      - observability
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mimir:
    image: grafana/mimir:2.15.0
    container_name: mimir
    restart: unless-stopped
    networks:
      - observability
    ports:
      - "9009:9009"
    volumes:
      - ./mimir/mimir-config.yml:/etc/mimir/mimir-config.yml:ro
      - mimir-data:/data
    command: -config.file=/etc/mimir/mimir-config.yml

  alloy:
    image: grafana/alloy:v1.8.2
    container_name: alloy
    restart: unless-stopped
    networks:
      - observability
    ports:
      - "12345:12345"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy
      - /proc:/proc:ro
      - /sys:/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run /etc/alloy/config.alloy --server.http.listen-addr=0.0.0.0:12345
    privileged: true
    pid: host
    cap_add:
      - BPF
      - SYS_PTRACE
      - NET_RAW
      - PERFMON
      - DAC_READ_SEARCH
      - CHECKPOINT_RESTORE
    security_opt:
      - apparmor:unconfined
    depends_on:
      loki:
        condition: service_healthy
      mimir:
        condition: service_started

  pyroscope:
    image: grafana/pyroscope:1.12.0
    container_name: pyroscope
    restart: unless-stopped
    networks:
      - observability
    ports:
      - "4040:4040"
    volumes:
      - pyroscope-data:/data

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    restart: unless-stopped
    networks:
      - observability
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
      mimir:
        condition: service_started
      pyroscope:
        condition: service_started

  demo-app:
    image: nginx:alpine
    container_name: demo-app
    restart: unless-stopped
    networks:
      - observability
    ports:
      - "8080:80"
    labels:
      beyla.instrument: "true"

  traffic-gen:
    image: alpine:3.19
    container_name: traffic-gen
    restart: unless-stopped
    init: true
    networks:
      - observability
    depends_on:
      loki:
        condition: service_healthy
      mimir:
        condition: service_started
    command: >
      sh -c "
        while true; do
          wget -q -O- http://demo-app:80 > /dev/null 2>&1;
          wget -q -O- http://loki:3100/ready > /dev/null 2>&1;
          wget -q -O- 'http://loki:3100/loki/api/v1/labels' > /dev/null 2>&1;
          wget -q -O- 'http://loki:3100/loki/api/v1/query?query=%7Bjob%3D%22alloy%22%7D&limit=5' > /dev/null 2>&1;
          wget -q -O- 'http://loki:3100/metrics' > /dev/null 2>&1;
          wget -q -O- 'http://mimir:9009/ready' > /dev/null 2>&1;
          wget -q -O- 'http://mimir:9009/prometheus/api/v1/labels' --header='X-Scope-OrgID: anonymous' > /dev/null 2>&1;
          wget -q -O- 'http://mimir:9009/prometheus/api/v1/query?query=up' --header='X-Scope-OrgID: anonymous' > /dev/null 2>&1;
          sleep 5;
        done
      "
