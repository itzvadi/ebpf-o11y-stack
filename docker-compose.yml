name: observability

networks:
  observability:
    driver: bridge

volumes:
  loki-data:
  mimir-data:
  grafana-data:
  pyroscope-data:

services:

  loki:
    image: grafana/loki:3.4.1
    container_name: loki
    restart: unless-stopped
    networks:
      - observability
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mimir:
    image: grafana/mimir:2.15.0
    container_name: mimir
    restart: unless-stopped
    networks:
      - observability
    ports:
      - "127.0.0.1:9009:9009"
    volumes:
      - ./mimir/mimir-config.yml:/etc/mimir/mimir-config.yml:ro
      - mimir-data:/data
    command: -config.file=/etc/mimir/mimir-config.yml

  alloy:
    image: grafana/alloy:v1.8.2
    container_name: alloy
    restart: unless-stopped
    networks:
      - observability
    ports:
      - "127.0.0.1:12345:12345"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /proc:/proc:ro
      - /sys:/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run /etc/alloy/config.alloy --server.http.listen-addr=0.0.0.0:12345
    privileged: true
    pid: host
    cap_add:
      - BPF
      - SYS_PTRACE
      - NET_RAW
      - PERFMON
      - DAC_READ_SEARCH
      - CHECKPOINT_RESTORE
    security_opt:
      - apparmor:unconfined
    depends_on:
      loki:
        condition: service_healthy
      mimir:
        condition: service_started

  pyroscope:
    image: grafana/pyroscope:1.12.0
    container_name: pyroscope
    restart: unless-stopped
    networks:
      - observability
    ports:
      - "127.0.0.1:4040:4040"
    volumes:
      - pyroscope-data:/data

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    restart: unless-stopped
    networks:
      - observability
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
      mimir:
        condition: service_started
      pyroscope:
        condition: service_started

